# OrchestratoRRR — example TOML configuration.
#
# Copy this file to `orchestrator.local.toml` and adjust paths for your machine.
# `orchestrator.local.toml` is git-ignored.

[orchestrator]
log_dir = "logs"
report_dir = "run-results"
heartbeat_interval_seconds = 10
poll_interval_seconds = 1

[mumu]
executable = "C:\\path\\to\\MuMuNxDevice.exe"
adb_executable = "C:\\path\\to\\adb.exe"
adb_serial = "127.0.0.1:16384"
start_timeout_seconds = 120
stop_timeout_seconds = 20

[starrail]
executable = "C:\\path\\to\\StarRailCopilot\\toolkit\\python.exe"
working_directory = "C:\\path\\to\\StarRailCopilot"
arguments = ["gui.py", "--run", "src", "--port", "22367"]
log_path_template = 'log/{date}_src.txt'
success_keywords = [
    "No task pending",
    "for task `Restart`",
]
failure_keywords = [
    "ScriptError:",
    "Request human takeover",
    "Retry screenshot() failed",
    "NemuIpcError",
]
task_timeout_seconds = 3600
stop_timeout_seconds = 10

[starrail.environment]
PYTHONIOENCODING = "utf-8"

[maa]
executable = "C:\\path\\to\\MAA\\MAA.exe"
working_directory = "C:\\path\\to\\MAA"
arguments = []
timeout_seconds = 1800
stop_timeout_seconds = 10

[maa.environment]
PYTHONIOENCODING = "utf-8"

[aalc]
executable = "C:\\path\\to\\AALC.exe"
working_directory = "C:\\path\\to\\AALC"
arguments = []
attempts = 3
attempt_timeout_seconds = 7200
stop_timeout_seconds = 10

[aalc.environment]
PYTHONIOENCODING = "utf-8"
